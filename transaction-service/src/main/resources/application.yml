spring:
        application:
                name: transaction-service

        datasource:
                url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_transactions}
                username: ${DB_USER:postgres}
                password: ${DB_PASSWORD:postgres}
                hikari:
                        maximum-pool-size: 10
                        minimum-idle: 2

        jpa:
                hibernate:
                        ddl-auto: validate
                show-sql: false
                properties:
                        hibernate:
                                dialect: org.hibernate.dialect.PostgreSQLDialect

        flyway:
                enabled: true
                locations: classpath:db/migration
                baseline-on-migrate: true

        threads:
                virtual:
                        enabled: true

server:
        port: ${SERVER_PORT:8083}

security:
        jwt:
                access-secret: ${JWT_ACCESS_SECRET:super-secret-key-at-least-32-chars-long!!}

services:
        account:
                url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}

management:
        endpoints:
                web:
                        exposure:
                                include: health, info, metrics

logging:
        level:
                com.paymentystem: DEBUG
        pattern:
                console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"