apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: payment-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
      - name: account-service
        image: docker.io/payment-system/account-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: SERVER_PORT
          value: "8082"
        - name: DB_URL
          value: jdbc:postgresql://192.168.1.16:5432/payment_accounts
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: payment-config
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: payment-secrets
              key: DB_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: payment-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: payment-config
              key: REDIS_PORT
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: payment-secrets
              key: JWT_ACCESS_SECRET
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: payment-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: payment-config
              key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 90
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: payment-system
spec:
  selector:
    app: account-service
  ports:
  - port: 8082
    targetPort: 8082
  type: ClusterIP
